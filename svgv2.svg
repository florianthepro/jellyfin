<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="820" viewBox="0 0 1450 820">
<style>
*{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,sans-serif}
.zone{fill:#eef2ff;stroke:#6366f1;stroke-width:2}
.zone-title{font-size:22px;font-weight:700;fill:#3730a3}
.zone-public{fill:#fff7ed;stroke:#fb923c;stroke-width:2}
.zone-title-public{font-size:22px;font-weight:700;fill:#c2410c}
.box{fill:#ffffff;stroke:#94a3b8;stroke-width:1.6;rx:10;ry:10}
.box-title{font-size:16px;font-weight:700;fill:#0f172a}
.box-info{font-size:13px;fill:#334155}
.note{font-size:12px;fill:#64748b}
.storage{fill:#fafafa;stroke:#475569;stroke-width:1.6;rx:12;ry:12}
.storage-title{font-size:16px;font-weight:700;fill:#0f172a}
.arrow{stroke:#475569;stroke-width:2;fill:none}
.arrow-api{stroke:#64748b;stroke-width:1.6;fill:none;stroke-dasharray:6 4}
.arrow-funnel{stroke:#16a34a;stroke-width:3;fill:none}
.arrow-label{font-size:12px;fill:#334155}
.client{fill:#ffffff;stroke:#ea580c;stroke-width:2;rx:12;ry:12}
.client-title{font-size:16px;font-weight:700;fill:#7c2d12}
.funnel{fill:#ffffff;stroke:#16a34a;stroke-width:2;rx:12;ry:12}
.funnel-title{font-size:16px;font-weight:700;fill:#166534}
</style>

<defs>
<marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M0,0 L0,12 L12,6 z" fill="#475569"/>
</marker>

<marker id="arrowApiHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M0,0 L0,12 L12,6 z" fill="#64748b"/>
</marker>

<marker id="arrowFunnelHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M0,0 L0,12 L12,6 z" fill="#16a34a"/>
</marker>
</defs>

<rect class="zone" x="20" y="20" width="900" height="780"/>
<text class="zone-title" x="40" y="55">Lokales Netzwerk</text>

<rect class="box" x="60" y="100" width="300" height="100"/>
<text class="box-title" x="80" y="130">Jellyfin</text>
<text class="box-info" x="80" y="150">Port 8096</text>
<text class="note" x="80" y="170">Medien-Streaming</text>

<rect class="box" x="60" y="230" width="300" height="100"/>
<text class="box-title" x="80" y="260">Sonarr</text>
<text class="box-info" x="80" y="280">Port 8989</text>
<text class="note" x="80" y="300">Serien-Management</text>

<rect class="box" x="60" y="360" width="300" height="100"/>
<text class="box-title" x="80" y="390">Radarr</text>
<text class="box-info" x="80" y="410">Port 7878</text>
<text class="note" x="80" y="430">Film-Management</text>

<rect class="box" x="60" y="490" width="300" height="100"/>
<text class="box-title" x="80" y="520">qBittorrent</text>
<text class="box-info" x="80" y="540">Port 8080</text>
<text class="note" x="80" y="560">Downloader</text>

<rect class="box" x="400" y="100" width="300" height="100"/>
<text class="box-title" x="420" y="130">Seerr</text>
<text class="box-info" x="420" y="150">Port 5055</text>
<text class="note" x="420" y="170">Request-Verwaltung</text>

<rect class="box" x="400" y="230" width="300" height="100"/>
<text class="box-title" x="420" y="260">Tailscale Node</text>
<text class="box-info" x="420" y="280">Host Network</text>
<text class="note" x="420" y="300">Funnel Endpunkt</text>

<rect class="storage" x="260" y="630" width="400" height="130"/>
<text class="storage-title" x="280" y="660">Medienbibliothek</text>
<text class="box-info" x="280" y="685">/home/fill-usr/media</text>
<text class="note" x="280" y="705">read: Jellyfin</text>
<text class="note" x="280" y="725">write: Sonarr, Radarr, qBittorrent</text>

<path class="arrow-api" d="M360 150 L400 150" marker-end="url(#arrowApiHead)"/>
<text class="arrow-label" x="365" y="140">API</text>

<path class="arrow-api" d="M360 275 L400 275" marker-end="url(#arrowApiHead)"/>
<text class="arrow-label" x="365" y="265">API</text>

<path class="arrow-api" d="M360 405 L385 405 L385 520 L400 520" marker-end="url(#arrowApiHead)"/>
<text class="arrow-label" x="285" y="505">DL-Steuerung</text>

<path class="arrow" d="M210 200 L210 630" marker-end="url(#arrowHead)"/>
<text class="arrow-label" x="225" y="415">Writes / Reads</text>

<rect class="zone-public" x="960" y="20" width="470" height="780"/>
<text class="zone-title-public" x="980" y="55">Internet / Öffentlich</text>

<rect class="funnel" x="1000" y="120" width="380" height="120"/>
<text class="funnel-title" x="1020" y="150">Tailscale Funnel</text>
<text class="box-info" x="1020" y="175">Öffentliche URL</text>
<text class="box-info" x="1020" y="195">HTTPS 443 → Jellyfin 8096</text>

<rect class="client" x="1040" y="320" width="320" height="140"/>
<text class="client-title" x="1060" y="350">Externes Gerät</text>
<text class="note" x="1060" y="370">Laptop / Smartphone / TV</text>
<text class="note" x="1060" y="390">Zugriff über HTTPS</text>

<path class="arrow-funnel" d="M700 280 L960 280" marker-end="url(#arrowFunnelHead)"/>
<text class="arrow-label" x="750" y="265">Sicherer Tunnel</text>

<path class="arrow-funnel" d="M1190 240 L1190 320" marker-end="url(#arrowFunnelHead)"/>
<text class="arrow-label" x="1200" y="280">HTTPS 443</text>

</svg>
