<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
<style>
text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,sans-serif}
.zone{fill:#eef2ff;stroke:#6366f1;stroke-width:2}
.zone-title{font-size:20px;font-weight:600;fill:#3730a3}
.zone-public{fill:#fff7ed;stroke:#fb923c;stroke-width:2}
.zone-title-public{font-size:20px;font-weight:600;fill:#c2410c}
.service{fill:#ffffff;stroke:#94a3b8;stroke-width:1.4;rx:8;ry:8}
.service-title{font-size:14px;font-weight:600;fill:#0f172a}
.service-port{font-size:12px;fill:#334155}
.service-note{font-size:11px;fill:#64748b}
.storage{fill:#fafafa;stroke:#475569;stroke-width:1.4;rx:10;ry:10}
.storage-title{font-size:14px;font-weight:600;fill:#0f172a}
.storage-path{font-size:12px;fill:#334155}
.client{fill:#ffffff;stroke:#ea580c;stroke-width:1.6;rx:12;ry:12}
.client-title{font-size:15px;font-weight:600;fill:#7c2d12}
.funnel{fill:#ffffff;stroke:#16a34a;stroke-width:1.8;rx:10;ry:10}
.funnel-title{font-size:14px;font-weight:700;fill:#166534}
.funnel-note{font-size:12px;fill:#15803d}
.link{stroke:#475569;stroke-width:1.5;fill:none}
.link-api{stroke:#94a3b8;stroke-width:1.3;fill:none;stroke-dasharray:6 4}
.link-funnel{stroke:#16a34a;stroke-width:2}
.link-label{font-size:11px;fill:#475569}
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
</marker>
<marker id="arrowApi" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
</marker>
<marker id="arrowFunnel" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
</marker>
</defs>

<rect class="zone" x="20" y="20" width="700" height="700"/>
<text class="zone-title" x="40" y="50">Lokales Netzwerk</text>

<rect class="service" x="60" y="90" width="280" height="80"/>
<text class="service-title" x="80" y="115">Jellyfin</text>
<text class="service-port" x="80" y="135">Port 8096 (HTTP)</text>
<text class="service-note" x="80" y="153">Medien-Streaming</text>

<rect class="service" x="60" y="200" width="280" height="80"/>
<text class="service-title" x="80" y="225">Sonarr</text>
<text class="service-port" x="80" y="245">Port 8989</text>
<text class="service-note" x="80" y="263">Serien-Management</text>

<rect class="service" x="60" y="310" width="280" height="80"/>
<text class="service-title" x="80" y="335">Radarr</text>
<text class="service-port" x="80" y="355">Port 7878</text>
<text class="service-note" x="80" y="373">Film-Management</text>

<rect class="service" x="60" y="420" width="280" height="80"/>
<text class="service-title" x="80" y="445">qBittorrent</text>
<text class="service-port" x="80" y="465">Port 8080</text>
<text class="service-note" x="80" y="483">Downloader</text>

<rect class="service" x="380" y="90" width="280" height="80"/>
<text class="service-title" x="400" y="115">Seerr</text>
<text class="service-port" x="400" y="135">Port 5055</text>
<text class="service-note" x="400" y="153">Request-Verwaltung</text>

<rect class="service" x="380" y="200" width="280" height="80"/>
<text class="service-title" x="400" y="225">Tailscale Node</text>
<text class="service-port" x="400" y="245">Host-Modus / Funnel</text>
<text class="service-note" x="400" y="263">Sichere externe Erreichbarkeit</text>

<rect class="storage" x="200" y="550" width="320" height="110"/>
<text class="storage-title" x="220" y="575">Medienbibliothek</text>
<text class="storage-path" x="220" y="595">/home/fill-usr/media</text>
<text class="storage-path" x="220" y="615">read: Jellyfin</text>
<text class="storage-path" x="220" y="635">write: Sonarr | Radarr | qBittorrent</text>

<rect class="zone-public" x="760" y="20" width="420" height="700"/>
<text class="zone-title-public" x="780" y="50">Internet / Öffentlich</text>

<rect class="funnel" x="800" y="100" width="350" height="100"/>
<text class="funnel-title" x="820" y="130">Tailscale Funnel</text>
<text class="funnel-note" x="820" y="150">Öffentliche URL</text>
<text class="funnel-note" x="820" y="168">443 → Jellyfin 8096</text>

<rect class="client" x="840" y="260" width="280" height="140"/>
<text class="client-title" x="860" y="290">Externes Gerät</text>
<text class="service-note" x="860" y="310">Laptop / Smartphone / TV</text>
<text class="service-note" x="860" y="330">Zugriff per HTTPS</text>

<path class="link-api" d="M340 240 L380 240" marker-end="url(#arrowApi)"/>
<text class="link-label" x="345" y="230">API</text>

<path class="link-api" d="M340 350 L380 350" marker-end="url(#arrowApi)"/>
<text class="link-label" x="345" y="340">API</text>

<path class="link-api" d="M60 460 L40 460 L40 450 L380 450" marker-end="url(#arrowApi)"/>
<text class="link-label" x="120" y="440">DL-Steuerung</text>

<path class="link" d="M200 170 L200 550" marker-end="url(#arrow)"/>
<text class="link-label" x="210" y="360">Reads/Writes</text>

<path class="link-funnel" d="M660 240 L760 240" marker-end="url(#arrowFunnel)"/>
<text class="link-label" x="680" y="225">Funnel Connection</text>

<path class="link-funnel" d="M975 200 L975 260" marker-end="url(#arrowFunnel)"/>
<text class="link-label" x="985" y="230">HTTPS 443</text>
</svg>
