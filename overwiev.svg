<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600">
<style>
svg{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,sans-serif}
.zone{fill:#f3f6fb;stroke:#9fb3d1;stroke-width:2}
.zone-public{fill:#fff7f0;stroke:#d4a574;stroke-width:2}
.zone-title{font-size:18px;font-weight:600;fill:#1e3a8a}
.zone-title-public{font-size:18px;font-weight:600;fill:#9a3412}
.host{fill:#ffffff;stroke:#cbd5f5;stroke-width:1.2}
.host-title{font-size:15px;font-weight:600;fill:#0f172a}
.service{fill:#e5edf8;stroke:#3b82f6;stroke-width:1;rx:6;ry:6}
.service-alt{fill:#efe5f8;stroke:#8b5cf6;stroke-width:1;rx:6;ry:6}
.service-download{fill:#e5f8ef;stroke:#22c55e;stroke-width:1;rx:6;ry:6}
.service-vpn{fill:#e0f2fe;stroke:#0ea5e9;stroke-width:1;rx:6;ry:6}
.service-title{font-size:13px;font-weight:600;fill:#0f172a}
.service-port{font-size:11px;fill:#475569}
.storage{fill:#ffffff;stroke:#64748b;stroke-width:1.4;rx:6;ry:6}
.storage-title{font-size:13px;font-weight:600;fill:#020617}
.storage-path{font-size:11px;fill:#334155}
.client{fill:#ffffff;stroke:#ea580c;stroke-width:1.3;rx:10;ry:10}
.client-title{font-size:13px;font-weight:600;fill:#7c2d12}
.client-sub{font-size:11px;fill:#9a3412}
.funnel{fill:#ffffff;stroke:#16a34a;stroke-width:1.5;rx:8;ry:8}
.funnel-title{font-size:13px;font-weight:600;fill:#166534}
.funnel-port{font-size:11px;fill:#15803d}
.link-solid{stroke:#475569;stroke-width:1.6;fill:none}
.link-dashed{stroke:#94a3b8;stroke-width:1.4;fill:none;stroke-dasharray:5 4}
.link-accent{stroke:#16a34a;stroke-width:2;fill:none}
.link-label{font-size:10px;fill:#475569}
.note{font-size:10px;fill:#6b7280}
</style>
<defs>
<marker id="arrowSolid" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
</marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
</marker>
<marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
</marker>
</defs>
<rect class="zone" x="20" y="20" width="600" height="560"/>
<text class="zone-title" x="35" y="45">Lokales Netzwerk</text>
<rect class="host" x="40" y="60" width="560" height="480" rx="10" ry="10"/>
<text class="host-title" x="55" y="85">Docker Host / Medien-Server</text>
<rect class="service" x="60" y="100" width="240" height="70"/>
<text class="service-title" x="75" y="120">Jellyfin</text>
<text class="service-port" x="75" y="138">Port 8096 (HTTP)</text>
<text class="note" x="75" y="154">Medien-Streaming</text>
<rect class="service-alt" x="340" y="100" width="240" height="70"/>
<text class="service-title" x="355" y="120">Seerr</text>
<text class="service-port" x="355" y="138">Port 5055 (HTTP)</text>
<text class="note" x="355" y="154">Requests / Frontend</text>
<rect class="service-alt" x="60" y="200" width="240" height="70"/>
<text class="service-title" x="75" y="220">Sonarr</text>
<text class="service-port" x="75" y="238">Port 8989 (HTTP)</text>
<text class="note" x="75" y="254">Serien-Management</text>
<rect class="service-alt" x="340" y="200" width="240" height="70"/>
<text class="service-title" x="355" y="220">Radarr</text>
<text class="service-port" x="355" y="238">Port 7878 (HTTP)</text>
<text class="note" x="355" y="254">Film-Management</text>
<rect class="service-download" x="60" y="300" width="240" height="70"/>
<text class="service-title" x="75" y="320">qBittorrent</text>
<text class="service-port" x="75" y="338">Port 8080 (Web UI)</text>
<text class="note" x="75" y="354">Downloader</text>
<rect class="service-vpn" x="340" y="300" width="240" height="70"/>
<text class="service-title" x="355" y="320">Tailscale Node</text>
<text class="service-port" x="355" y="338">Host-Netzwerk, Funnel</text>
<text class="note" x="355" y="354">Sichere Remote-Erreichbarkeit</text>
<rect class="storage" x="200" y="400" width="240" height="100"/>
<text class="storage-title" x="215" y="422">Medienbibliothek</text>
<text class="storage-path" x="215" y="442">/home/fill-usr/media</text>
<text class="note" x="215" y="460">Von Jellyfin gelesen</text>
<text class="note" x="215" y="474">Von Sonarr/Radarr/qBittorrent beschrieben</text>
<path class="link-dashed" d="M460 170 L460 185 L180 185 L180 200" marker-end="url(#arrowDashed)"/>
<text class="link-label" x="300" y="182">API: Seerr → Sonarr</text>
<path class="link-dashed" d="M460 170 L460 200" marker-end="url(#arrowDashed)"/>
<text class="link-label" x="468" y="190">API: Seerr → Radarr</text>
<path class="link-dashed" d="M180 270 L180 300" marker-end="url(#arrowDashed)"/>
<text class="link-label" x="95" y="290">API: Sonarr → qBittorrent</text>
<path class="link-dashed" d="M460 270 L460 285 L180 285 L180 300" marker-end="url(#arrowDashed)"/>
<text class="link-label" x="320" y="282">API: Radarr → qBittorrent</text>
<path class="link-solid" d="M180 170 L180 360 L320 360 L320 400" marker-end="url(#arrowSolid)"/>
<text class="link-label" x="90" y="355">Jellyfin liest Medien</text>
<path class="link-solid" d="M180 270 L180 340 L320 340 L320 400" marker-end="url(#arrowSolid)"/>
<text class="link-label" x="100" y="335">Sonarr schreibt Medien</text>
<path class="link-solid" d="M460 270 L460 340 L320 340 L320 400" marker-end="url(#arrowSolid)"/>
<text class="link-label" x="380" y="335">Radarr schreibt Medien</text>
<path class="link-solid" d="M180 370 L180 380 L320 380 L320 400" marker-end="url(#arrowSolid)"/>
<text class="link-label" x="95" y="383">qBittorrent lädt nach /media</text>
<rect class="zone-public" x="650" y="20" width="430" height="560"/>
<text class="zone-title-public" x="665" y="45">Internet / Öffentliches Netz</text>
<rect class="funnel" x="700" y="120" width="330" height="80"/>
<text class="funnel-title" x="715" y="142">Tailscale Funnel</text>
<text class="funnel-port" x="715" y="160">Öffentliche URL → Host (Tailscale Node)</text>
<text class="funnel-port" x="715" y="176">HTTPS 443 → Jellyfin 8096</text>
<rect class="client" x="750" y="260" width="260" height="120"/>
<text class="client-title" x="765" y="282">Client-Gerät</text>
<text class="client-sub" x="765" y="300">z.B. Laptop, TV, Smartphone</text>
<text class="client-sub" x="765" y="318">Zugriff per Browser / App</text>
<path class="link-accent" d="M580 335 L630 335 L630 200 L700 200" marker-end="url(#arrowAccent)"/>
<text class="link-label" x="585" y="328">Sichere Verbindung</text>
<path class="link-accent" d="M865 200 L865 260" marker-end="url(#arrowAccent)"/>
<text class="link-label" x="875" y="232">HTTPS 443</text>
<text class="note" x="660" y="540">Nur Jellyfin wird nach außen freigegeben; Admin-Interfaces bleiben im lokalen Netz.</text>
</svg>
