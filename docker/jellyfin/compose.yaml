services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    ports:
      - 8096:8096/tcp
    volumes:
      - /home/username/docker/jellyfin/config:/config
      - /home/username/docker/jellyfin/cache:/cache
      - type: bind
        source: /home/username/media
        target: /media
        read_only: true
    restart: 'unless-stopped'
